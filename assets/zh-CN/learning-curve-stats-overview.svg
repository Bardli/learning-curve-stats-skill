<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">训练曲线统计 Skill 中文概览</title>
  <desc id="desc">A training curve is converted into smoothed trends, derivatives, noise metrics, gap metrics, and agent diagnosis.</desc>
  <rect width="1200" height="620" rx="28" fill="#0f172a"></rect>
  <rect x="28" y="28" width="1144" height="564" rx="22" fill="#111827" stroke="#334155" stroke-width="2"></rect>

  <text x="70" y="84" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">训练曲线统计</text>
  <text x="70" y="118" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="18">把嘈杂训练曲线转成 AI 可推理的统计证据。</text>

  <rect x="70" y="160" width="420" height="330" rx="18" fill="#020617" stroke="#334155" stroke-width="2"></rect>
  <text x="98" y="202" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">原始曲线与平滑曲线</text>
  <line x1="112" y1="430" x2="448" y2="430" stroke="#64748b" stroke-width="2"></line>
  <line x1="112" y1="244" x2="112" y2="430" stroke="#64748b" stroke-width="2"></line>
  <polyline points="112,398 145,374 178,390 211,338 244,355 277,302 310,316 343,270 376,288 409,246 448,262" stroke="#fb7185" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"></polyline>
  <path d="M112 399 C160 382, 178 366, 211 350 C254 327, 287 315, 310 300 C354 274, 394 260, 448 248" stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round"></path>
  <circle cx="211" cy="338" r="7" fill="#fb7185"></circle>
  <circle cx="376" cy="288" r="7" fill="#fb7185"></circle>
  <rect x="108" y="455" width="18" height="18" rx="4" fill="#fb7185"></rect>
  <text x="136" y="470" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">原始指标：保留尖峰与噪声</text>
  <rect x="108" y="482" width="18" height="18" rx="4" fill="#38bdf8"></rect>
  <text x="136" y="497" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">平滑趋势：用于斜率与加速度</text>

  <rect x="540" y="160" width="390" height="330" rx="18" fill="#020617" stroke="#334155" stroke-width="2"></rect>
  <text x="568" y="202" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">统计证据</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="16">
    <rect x="570" y="230" width="300" height="38" rx="10" fill="#0f766e"></rect>
    <text x="590" y="255" fill="#ecfeff">斜率：validation 是否仍在改善？</text>
    <rect x="570" y="282" width="300" height="38" rx="10" fill="#2563eb"></rect>
    <text x="590" y="307" fill="#eff6ff">加速度：学习速度是否在变慢？</text>
    <rect x="570" y="334" width="300" height="38" rx="10" fill="#7c3aed"></rect>
    <text x="590" y="359" fill="#f5f3ff">roughness：优化是否嘈杂？</text>
    <rect x="570" y="386" width="300" height="38" rx="10" fill="#be123c"></rect>
    <text x="590" y="411" fill="#fff1f2">spikes：是否有不稳定事件？</text>
    <rect x="570" y="438" width="300" height="38" rx="10" fill="#ca8a04"></rect>
    <text x="590" y="463" fill="#fefce8">gap：模型是否过拟合？</text>
  </g>

  <rect x="980" y="160" width="130" height="330" rx="18" fill="#020617" stroke="#334155" stroke-width="2"></rect>
  <text x="1004" y="202" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Agent</text>
  <text x="1005" y="245" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">诊断</text>
  <text x="1005" y="272" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">过拟合</text>
  <text x="1005" y="299" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">平台期</text>
  <text x="1005" y="326" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">LR 问题</text>
  <text x="1005" y="353" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">不稳定</text>
  <text x="1005" y="380" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">最佳 step</text>
  <text x="1005" y="407" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">下一步</text>

  <path d="M500 325 H528" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"></path>
  <path d="M520 315 L532 325 L520 335" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
  <path d="M940 325 H968" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"></path>
  <path d="M960 315 L972 325 L960 335" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

  <rect x="70" y="525" width="1040" height="34" rx="17" fill="#1e293b"></rect>
  <text x="94" y="548" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15">原则：不要让 agent 只凭好看的图猜；给它原始 scalar history、稳健统计量和简短证据报告。</text>
</svg>